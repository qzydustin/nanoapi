# Full example covering the main config fields supported by nanoapi.
# Use config.example.yaml for a smaller starting point.
#
# nanoapi proxies Claude Code (Anthropic Messages API) to OpenWebUI
# (OpenAI-compatible upstream). The client protocol is always Anthropic
# Messages and the upstream protocol is always OpenAI Chat Completions.

server:
  host: 0.0.0.0
  port: 8080
  # Upstream request timeout in seconds (default: 300).
  timeout_seconds: 300
  # Maximum request body size in bytes (default: 10485760 = 10 MB).
  max_body_bytes: 10485760

logging:
  debug: false
  request_dir: /app/data/request-logs

storage:
  # SQLite is the only supported storage backend at the moment.
  driver: sqlite
  dsn: /app/data/nanoapi.db

tokens:
  # Static API tokens used for both model access and /api self-query.
  - id: default
    key: nk_replace_me
  - id: internal
    key: nk_replace_me_too

providers:
  # Each provider is an OpenAI-compatible upstream (e.g. OpenWebUI).
  # Multiple providers can serve the same client model with priority-based
  # fallback: if the highest-priority provider returns 5xx, the next one
  # is tried automatically.

  - name: openwebui-primary
    base_url: https://chat.example.com/api
    api_key: your-openwebui-jwt-token
    priority: 100
    force_stream: true
    models:
      # client model name -> upstream model config
      claude-opus-4-6:
        upstream: bedrock-claude-4-6-opus
        reasoning:
          allowed_efforts: [low, medium, high]
          # Map client effort values to upstream values (e.g. Claude Code sends "max").
          effort_map:
            max: high
      claude-haiku-4-5-20251001:
        upstream: bedrock-claude-4-5-haiku
        reasoning:
          allowed_efforts: [low, medium, high]
          effort_map:
            max: high
    override:
      defaults:
        # Provider-level parameter overrides applied after provider selection.
        max_tokens: 4096
        reasoning_effort: medium
      rules:
        # Rules are evaluated top-to-bottom.
        # If multiple rules match, later ones override earlier ones.
        - target:
            client_model: claude-opus-4-6
          params:
            reasoning_effort: high

  # Fallback provider example (lower priority).
  # - name: openwebui-fallback
  #   base_url: https://backup.example.com/api
  #   api_key: your-backup-jwt-token
  #   priority: 50
  #   force_stream: true
  #   models:
  #     claude-opus-4-6:
  #       upstream: bedrock-claude-4-6-opus
  #       reasoning:
  #         allowed_efforts: [low, medium, high]
  #         effort_map:
  #           max: high
