server:
  host: 0.0.0.0
  port: 8080

storage:
  driver: sqlite
  dsn: /app/data/nanoapi.db

tokens:
  - id: default
    key: nk_replace_me

providers:
  - name: anthropic-main
    protocol: anthropic_messages
    base_url: https://api.anthropic.com
    api_key: your-anthropic-api-key
    priority: 100
    headers:
      anthropic-version: "2023-06-01"
    force_stream: true
    models:
      gpt-4o-mini:
        upstream: claude-3-7-sonnet-20250219
      gpt-4o:
        upstream: claude-3-7-sonnet-20250219
      claude-sonnet:
        upstream: claude-3-7-sonnet-20250219
    override:
      defaults:
        reasoning:
          mode: enabled
          budget_tokens: 4096

  - name: openai-main
    protocol: openai_chat
    base_url: https://api.openai.com
    api_key: your-openai-api-key
    # Search implementation for built-in web search tools.
    # openai: emit as a tool object in the tools array (OpenAI native format)
    # openwebui: emit as a feature flag in a top-level features object (Open WebUI format)
    search_mode: openai
    priority: 90
    force_stream: true
    models:
      gpt-4o-mini:
        upstream: gpt-4o-mini
      gpt-5-mini:
        upstream: gpt-5-mini
      claude-3-7-sonnet-20250219:
        upstream: gpt-5-mini
    override:
      defaults:
        reasoning:
          effort: medium
